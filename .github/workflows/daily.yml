name: Daily Turkey countdown

on:
  schedule:
    - cron: "0 21 * * *"  # 00:00 MSK (21:00 UTC) every day
  workflow_dispatch:

jobs:
  send:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Send daily post
        env:
          TG_BOT_TOKEN: ${{ secrets.TG_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TG_CHAT_ID }}
        run: python3 .github/scripts/daily.py
